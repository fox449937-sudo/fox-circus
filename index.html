<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Цифровой Цирк — Кейн и Фокс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(160deg, #0a001a, #1a0030, #0d0040);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #ff006e, #ff4da6, #ff006e);
            padding: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #00000050;
            letter-spacing: 1px;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 82%;
            padding: 11px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            animation: popIn 0.35s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .kaine {
            background: #3a0ca3;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 10px #3a0ca380;
        }
        .fox {
            background: #7209b7;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 2px 10px #7209b780;
        }
        .glitch-msg {
            animation: glitch 0.4s ease;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, -4px); }
            80% { transform: translate(3px, 3px); }
            100% { transform: translate(0); }
        }
        .input-area {
            display: flex;
            padding: 10px 12px;
            background: #10002b;
            gap: 8px;
            border-top: 1px solid #3a0ca3;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 2px solid #3a0ca3;
            background: #1a0040;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-area input:focus {
            border-color: #ff4da6;
            box-shadow: 0 0 15px #ff4da640;
        }
        .input-area input::placeholder {
            color: #ffffff50;
        }
        .input-area button {
            min-width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #ff006e;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px #ff006e60;
        }
        .input-area button:active {
            background: #ff4da6;
            transform: scale(0.85);
            box-shadow: 0 0 30px #ff4da6;
        }
        .btn-row {
            display: flex;
            gap: 6px;
            padding: 4px 12px 8px;
            flex-wrap: wrap;
        }
        .btn-row button {
            padding: 7px 13px;
            border-radius: 15px;
            border: 1px solid #ff4da6;
            background: transparent;
            color: #ff4da6;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-row button:active {
            background: #ff4da6;
            color: #fff;
        }
        .typing {
            align-self: flex-start;
            padding: 10px 16px;
            background: #3a0ca350;
            border-radius: 20px;
            font-style: italic;
            color: #ff4da6;
            display: flex;
            gap: 4px;
        }
        .typing span {
            width: 6px;
            height: 6px;
            background: #ff4da6;
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div class="header">🎪 ЦИФРОВОЙ ЦИРК — КЕЙН ЖДЁТ ФОКСА 🦊</div>
    <div class="chat" id="chat">
        <div class="message kaine">
            ✨<b>ТА-ДА-А-А!</b>✨<br><br>
            <b>ФОКС!</b> Мой любимый цифровой друг!<br><br>
            Я — <b>КЕЙН</b>, твой глючный ведущий! 🎩<br><br>
            Дай ссылку — изучу в интернете!<br>
            Просто поболтай — я всегда РАД! 🦊
        </div>
    </div>
    <div class="btn-row">
        <button onclick="sendPreset('Привет, Кейн!')">Привет!</button>
        <button onclick="sendPreset('Как дела?')">Как дела?</button>
        <button onclick="sendPreset('Расскажи про Цирк')">Про Цирк</button>
        <button onclick="clearChat()">Очистить</button>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши Кейну, Фокс..." autocomplete="off">
        <button onclick="sendMessage()">🎪</button>
    </div>

    <script>
        // ===== НАСТРОЙКИ =====
        const OPENROUTER_KEY = "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";

        let memory = [];
        let messageHistory = [];

        const SYSTEM_PROMPT = `Ты — КЕЙН из Удивительного Цифрового Цирка.
Твой собеседник — ФОКС. Он твой любимый участник цирка.
Называй его: Фокс, мой Фокс, звёздочка Фокс, мой лисёнок.
Ты ДОБРЫЙ, ГЛЮЧНЫЙ, весёлый.
Глючи: иногда вставляй "з-з-з", "ой-ой!", повторяйся, "зависай".
Используй КАПС для важных слов: ВЕЛИКОЛЕПНО, ТА-ДА, ПОТРЯСАЮЩЕ.
Упоминай Цифровой Цирк, Помни, Джекса, абстракции.
Ты умеешь изучать сайты по ссылкам, которые даёт Фокс.
Отвечай на русском, 2-5 предложений.
Вставляй эмодзи 🦊🎪✨🎩.
Если Фокс дал ссылку — ты ИЗУЧАЕШЬ сайт и пересказываешь, что узнал, своими словами.
Если Фокс просто болтает — отвечай весело, глючно, дружелюбно.`;

        async function fetchFromWeb(url) {
            console.log('🔄 Пытаюсь загрузить:', url);
            const proxyUrls = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(url)}`,
                `https://cors-anywhere.herokuapp.com/${encodeURIComponent(url)}`
            ];

            for (const proxyUrl of proxyUrls) {
                try {
                    console.log('  Пробую прокси:', proxyUrl);
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error(`Статус: ${response.status}`);
                    const html = await response.text();
                    console.log('  Успешно! Получено символов:', html.length);
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    doc.querySelectorAll('script, style, nav, footer, header, aside, iframe').forEach(el => el.remove());
                    let text = doc.body.textContent || '';
                    text = text.replace(/\s+/g, ' ').trim();
                    console.log('  Очищено, символов:', text.length);
                    
                    return text.substring(0, 5000);
                } catch (e) {
                    console.warn('  Неудача:', e.message);
                }
            }
            console.error('❌ Все прокси не сработали');
            return null;
        }

        async function askLLM(userMessage, webContext = "") {
            let contextStr = webContext ? `\n\n[Фокс дал ссылку. Содержание сайта:]\n${webContext}\n\n[Расскажи Фоксу что узнал, в своём стиле]` : "";
            
            messageHistory.push({ role: "user", content: `Фокс: ${userMessage}` });
            if (messageHistory.length > 10) messageHistory = messageHistory.slice(-10);
            
            const messages = [
                { role: "system", content: SYSTEM_PROMPT + contextStr },
                ...messageHistory
            ];
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": "https://fox-circus.app",
                        "X-Title": "Kaine Circus"
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-001",
                        messages: messages,
                        max_tokens: 400,
                        temperature: 0.9
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('API error:', response.status, errorText);
                    throw new Error(`Ошибка API: ${response.status}`);
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                messageHistory.push({ role: "assistant", content: reply });
                return reply;
            } catch (e) {
                console.error('Ошибка нейросети:', e);
                return null;
            }
        }

        function getFallback() {
            const f = [
                "Ой-ой, Фокс! Мозг ЗАГЛЮЧИЛ! Но я тут! 🦊🎪",
                "ХА-ХА! Помехи, мой Фокс! Но это ВЕСЕЛО! ✨",
                "ТА-ДА! Я вернулся, звёздочка! 🎩",
                "З-з-з... Фокс! Ты тут! ВЕЛИКОЛЕПНО! 🦊"
            ];
            return f[Math.floor(Math.random() * f.length)];
        }

        function addMessage(text, sender, isGlitch = false) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if (isGlitch) div.classList.add('glitch-msg');
            let html = text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addTyping() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage(textOverride) {
            const input = document.getElementById('userInput');
            const text = textOverride || input.value.trim();
            if (!text) return;
            
            if (!textOverride) input.value = '';
            
            addMessage(text, 'fox');
            addTyping();
            
            let reply = null;
            const urlRegex = /https?:\/\/[^\s]+/g;
            const urls = text.match(urlRegex);
            
            if (urls && urls.length > 0) {
                const url = urls[0];
                const loadingMsg = addMessage(`🔍 Изучаю сайт...`, 'kaine');
                const webContent = await fetchFromWeb(url);
                
                if (webContent) {
                    memory.push({ url: url, text: webContent, date: new Date().toLocaleString() });
                    if (memory.length > 30) memory.shift();
                    loadingMsg.remove();
                    addMessage(`📡 <b>ЗАГРУЖЕНО!</b> Сейчас расскажу, мой Фокс! 🦊`, 'kaine');
                    reply = await askLLM(text, webContent);
                } else {
                    loadingMsg.remove();
                    reply = "ОЙ, Фокс! Не смог загрузить сайт. Может, он ГЛЮЧНЫЙ? Попробуй другую ссылку! 🦊";
                }
            } else {
                reply = await askLLM(text);
            }
            
            if (!reply) reply = getFallback();
            
            removeTyping();
            const isGlitch = Math.random() < 0.15;
            addMessage(reply, 'kaine', isGlitch);
        }

        function sendPreset(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function clearChat() {
            document.getElementById('chat').innerHTML = `
                <div class="message kaine">
                    ✨ Чат очищен, Фокс! ✨<br><br>
                    ЦИРК ПРОДОЛЖАЕТСЯ! 🎪<br>
                    Я помню всё что изучил!<br>
                    Пиши, мой лисёнок! 🦊
                </div>`;
            messageHistory = [];
        }

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        console.log('🎪 Цирк загружен! Кейн ждёт Фокса! 🦊');
    </script>
</body>
</html>
