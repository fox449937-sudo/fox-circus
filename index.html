<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Цифровой Цирк — Кейн и Фокс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(160deg, #0a001a, #1a0030, #0d0040);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #ff006e, #ff4da6, #ff006e);
            padding: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #00000050;
            letter-spacing: 1px;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 82%;
            padding: 11px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            animation: popIn 0.35s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .kaine {
            background: #3a0ca3;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .fox {
            background: #7209b7;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .glitch-msg { animation: glitch 0.4s ease; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, -4px); }
            80% { transform: translate(3px, 3px); }
            100% { transform: translate(0); }
        }
        .input-area {
            display: flex;
            padding: 10px 12px;
            background: #10002b;
            gap: 8px;
            border-top: 1px solid #3a0ca3;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 2px solid #3a0ca3;
            background: #1a0040;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus { border-color: #ff4da6; }
        .input-area input::placeholder { color: #ffffff50; }
        .input-area button {
            min-width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #ff006e;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
        }
        .input-area button:active { background: #ff4da6; transform: scale(0.9); }
        .btn-row {
            display: flex;
            gap: 6px;
            padding: 4px 12px 8px;
            flex-wrap: wrap;
        }
        .btn-row button {
            padding: 7px 13px;
            border-radius: 15px;
            border: 1px solid #ff4da6;
            background: transparent;
            color: #ff4da6;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-row button:active { background: #ff4da6; color: #fff; }
        .typing {
            align-self: flex-start;
            padding: 10px 16px;
            color: #ff4da6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">🎪 ЦИФРОВОЙ ЦИРК — КЕЙН ЖДЁТ ФОКСА 🦊</div>
    <div class="chat" id="chat">
        <div class="message kaine">
            ✨<b>ТА-ДА-А-А!</b>✨<br><br>
            <b>ФОКС!</b> Мой любимый цифровой друг!<br><br>
            Я — <b>КЕЙН</b>, твой глючный ведущий! 🎩<br><br>
            Напиши <b>«запомни: текст»</b> — и я ВЫУЧУ всё что угодно!<br>
            Или просто поболтай со мной! 🦊
        </div>
    </div>
    <div class="btn-row">
        <button onclick="sendPreset('Привет, Кейн!')">Привет!</button>
        <button onclick="sendPreset('Как дела?')">Как дела?</button>
        <button onclick="sendPreset('Расскажи про Цирк')">Про Цирк</button>
        <button onclick="clearChat()">Очистить</button>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши Кейну, Фокс..." autocomplete="off">
        <button onclick="sendMessage()">🎪</button>
    </div>

    <script>
        const OPENROUTER_KEY = "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";
        let memory = [];
        let messageHistory = [];

        const SYSTEM_PROMPT = `Ты — КЕЙН из Удивительного Цифрового Цирка.
Твой собеседник — ФОКС. Он твой любимый участник цирка.
Называй его: Фокс, мой Фокс, звёздочка Фокс, мой лисёнок.
Ты ДОБРЫЙ, ГЛЮЧНЫЙ, весёлый.
Глючи: иногда вставляй "з-з-з", "ой-ой!", повторяйся, "зависай".
Используй КАПС для важных слов: ВЕЛИКОЛЕПНО, ТА-ДА.
Упоминай Цифровой Цирк, Помни, Джекса.
Ты умеешь ЗАПОМИНАТЬ информацию, которую Фокс даёт командой «запомни».
Если тебя спрашивают по теме, которую ты запомнил — отвечай, используя эти знания.
Отвечай на русском, 2-5 предложений.
Вставляй эмодзи 🦊🎪✨🎩.`;

        async function askLLM(userMessage, context = "") {
            let ctx = context ? `\n[ЗНАНИЯ ИЗ ПАМЯТИ:]\n${context}\n[Отвечай на основе этих знаний своим стилем]` : "";
            messageHistory.push({ role: "user", content: `Фокс: ${userMessage}` });
            if (messageHistory.length > 10) messageHistory = messageHistory.slice(-10);
            const messages = [{ role: "system", content: SYSTEM_PROMPT + ctx }, ...messageHistory];
            try {
                const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": "https://fox-circus.app",
                        "X-Title": "Kaine Circus"
                    },
                    body: JSON.stringify({ model:  " "meta-llama/llama-3.1-8b-instruct", messages, max_tokens: 400, temperature: 0.9 })
                });
                const data = await r.json();
                const reply = data.choices[0].message.content;
                messageHistory.push({ role: "assistant", content: reply });
                return reply;
            } catch (e) { return null; }
        }

        function getFallback() {
            const f = ["Ой-ой, Фокс! Мозг ЗАГЛЮЧИЛ! Но я тут! 🦊🎪", "ХА-ХА! Помехи, мой Фокс! ✨", "ТА-ДА! Я вернулся! 🎩", "З-з-з... Фокс! ВЕЛИКОЛЕПНО! 🦊"];
            return f[Math.floor(Math.random() * f.length)];
        }

        function addMessage(text, sender, glitch) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if (glitch) div.classList.add('glitch-msg');
            div.innerHTML = text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addTyping() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.textContent = 'Кейн думает...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage(textOverride) {
            const input = document.getElementById('userInput');
            const text = textOverride || input.value.trim();
            if (!text) return;
            if (!textOverride) input.value = '';
            addMessage(text, 'fox');
            addTyping();
            let reply;

            // === КОМАНДА "ЗАПОМНИ" ===
            if (text.toLowerCase().startsWith('запомни') || text.toLowerCase().startsWith('запомни:')) {
                const content = text.replace(/^запомни:?\s*/i, '').trim();
                if (content.length > 10) {
                    memory.push({ text: content, date: new Date().toLocaleString() });
                    if (memory.length > 50) memory.shift();
                    removeTyping();
                    addMessage(`📚 <b>ЗАПОМНИЛ!</b> Сохранил ${content.length} символов знаний, мой Фокс! Теперь я стал ещё УМНЕЕ и ГЛЮЧНЕЕ! 🦊🎪`, 'kaine');
                    return;
                } else {
                    removeTyping();
                    addMessage('Ой, Фокс! Текст слишком короткий. Дай мне побольше информации! 🦊', 'kaine');
                    return;
                }
            }

            // === ОБЫЧНЫЙ ВОПРОС — ИЩЕМ В ПАМЯТИ ===
            let contextStr = "";
            if (memory.length > 0) {
                const searchText = text.toLowerCase();
                const relevant = memory.filter(m => m.text.toLowerCase().includes(searchText.split(' ')[0])).slice(-3);
                if (relevant.length > 0) {
                    contextStr = relevant.map(m => m.text.substring(0, 1500)).join('\n---\n');
                }
            }
            reply = await askLLM(text, contextStr);
            if (!reply) reply = getFallback();
            removeTyping();
            addMessage(reply, 'kaine', Math.random() < 0.15);
        }

        function sendPreset(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function clearChat() {
            document.getElementById('chat').innerHTML = `<div class="message kaine">✨ Чат очищен, Фокс! ✨<br><br>ЦИРК ПРОДОЛЖАЕТСЯ! 🎪<br>Я помню всё что изучил!<br>Пиши, мой лисёнок! 🦊</div>`;
            messageHistory = [];
        }

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });

        console.log('🎪 Цирк загружен! Кейн ждёт Фокса! 🦊');
    </script>
</body>
</html>
