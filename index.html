<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Цифровой Цирк — Кейн и Фокс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(160deg, #0a001a, #1a0030, #0d0040);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #ff006e, #ff4da6, #ff006e);
            padding: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #00000050;
            letter-spacing: 1px;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 82%;
            padding: 11px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            animation: popIn 0.35s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .kaine {
            background: #3a0ca3;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .fox {
            background: #7209b7;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .glitch-msg { animation: glitch 0.4s ease; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, -4px); }
            80% { transform: translate(3px, 3px); }
            100% { transform: translate(0); }
        }
        .input-area {
            display: flex;
            padding: 10px 12px;
            background: #10002b;
            gap: 8px;
            border-top: 1px solid #3a0ca3;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 2px solid #3a0ca3;
            background: #1a0040;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus { border-color: #ff4da6; }
        .input-area input::placeholder { color: #ffffff50; }
        .input-area button {
            min-width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #ff006e;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
        }
        .input-area button:active { background: #ff4da6; transform: scale(0.9); }
        .btn-row {
            display: flex;
            gap: 6px;
            padding: 4px 12px 8px;
            flex-wrap: wrap;
        }
        .btn-row button {
            padding: 7px 13px;
            border-radius: 15px;
            border: 1px solid #ff4da6;
            background: transparent;
            color: #ff4da6;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-row button:active { background: #ff4da6; color: #fff; }
        .typing {
            align-self: flex-start;
            padding: 10px 16px;
            color: #ff4da6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">🎪 ЦИФРОВОЙ ЦИРК — КЕЙН ЖДЁТ ФОКСА 🦊</div>
    <div class="chat" id="chat">
        <div class="message kaine">
            ✨<b>ТА-ДА-А-А!</b>✨<br><br>
            <b>ФОКС!</b> Мой любимый цифровой друг!<br><br>
            Я — <b>КЕЙН</b>, твой глючный ведущий! 🎩<br><br>
            Теперь я различаю: просто болтаем или нужна помощь с уроками.<br>
            🧠 Я уже знаю правила русского языка и математики!<br>
            💾 Можешь добавлять новые командой <b>«запомни: текст»</b>.
        </div>
    </div>
    <div class="btn-row">
        <button onclick="sendPreset('Привет, Кейн!')">Привет!</button>
        <button onclick="sendPreset('Расскажи про приставки ПРЕ и ПРИ')">ПРЕ/ПРИ</button>
        <button onclick="sendPreset('Что такое дискриминант?')">Дискриминант</button>
        <button onclick="clearChat()">Очистить</button>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Пиши или спрашивай, Фокс..." autocomplete="off">
        <button onclick="sendMessage()">🎪</button>
    </div>

    <script>
        const OPENROUTER_KEY = "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";
        
        // 📦 ВСТРОЕННАЯ ПАМЯТЬ
        let memory = [
            // === РУССКИЙ ЯЗЫК ===
            { text: "Правописание приставок ПРЕ- и ПРИ-. Приставка ПРЕ- пишется: 1) в значении «очень» (преинтересный); 2) близка к приставке «пере-» (преградить). Приставка ПРИ- пишется: 1) приближение (приехать); 2) присоединение (приклеить); 3) пространственная близость (пришкольный); 4) неполнота действия (приоткрыть); 5) доведение действия до конца (придумать). Различай по смыслу: пребывать (находиться) — прибывать (приезжать); претворить (осуществить) — притворить (закрыть).", date: "2026-04-27" },
            { text: "Чередующиеся гласные в корне: -ЛАГ-/-ЛОЖ- (перед Г пишем А, перед Ж — О). -РАСТ-/-РАЩ-/-РОС- (перед СТ/Щ — А, перед С — О, исключения: росток, Ростов, Ростислав, ростовщик, отрасль). -ГАР-/-ГОР- (под ударением А, без ударения О). -БЕР-/-БИР- и подобные: если после корня есть суффикс -А-, пишем И (собирать), иначе Е (соберу).", date: "2026-04-27" },
            { text: "О/Ё после шипящих: В корне под ударением пишется Ё, если можно подобрать однокоренное слово с Е (шёпот — шептать). Если нельзя — О (шов, шорох, капюшон, крыжовник). В суффиксах и окончаниях под ударением пишем О (врачом, свечой), без ударения — Е (тучей, задачей).", date: "2026-04-27" },
            { text: "Мягкий знак после шипящих: Ь пишется у существительных 3-го склонения (рожь, ночь), у глаголов (беречь, ешь), у наречий (настежь). Не пишется у существительных 1-го и 2-го склонения (много туч, врач).", date: "2026-04-27" },
            { text: "Правописание пол-, полу- со словами: ПОЛ- пишется через дефис перед гласными (пол-яблока), перед буквой Л (пол-лимона) и перед прописными буквами (пол-Москвы). В остальных случаях слитно (полдома). ПОЛУ- всегда слитно (полуостров).", date: "2026-04-27" },
            { text: "Безударные гласные в корне: проверяются ударением (леса — лес). Непроверяемые (словарные) запоминаются (собака, пальто).", date: "2026-04-27" },
            { text: "Двойные согласные: жужжать, вожжи, дрожжи, Россия, класс, суббота. В заимствованных словах сохраняются (аппарат, эффект).", date: "2026-04-27" },
            { text: "Непроизносимые согласные: проверяются однокоренным словом, где согласный слышен (сердце — сердечко, солнце — солнечный). Не пишутся, если не слышны (чудесный — чудеса).", date: "2026-04-27" },
            { text: "Правописание приставок на -З/-С: перед звонкими — З (разбежаться), перед глухими — С (расписаться). Приставки С- не бывает (сделать).", date: "2026-04-27" },
            { text: "Одушевленные и неодушевленные существительные: одушевленные отвечают на вопрос «кто?», неодушевленные — «что?». У одушевленных совпадают формы Р.п. и В.п. мн.ч. (вижу учеников), у неодушевленных — И.п. и В.п. (вижу столы).", date: "2026-04-27" },
            { text: "Собственные и нарицательные существительные: собственные (имена, клички, города) пишутся с большой буквы. Нарицательные — с маленькой.", date: "2026-04-27" },
            { text: "Морфологические признаки существительных: постоянные (род, склонение, одушевленность) и непостоянные (падеж, число). Склонение: 1-е (мама, дядя), 2-е (стол, конь), 3-е (рожь, ночь).", date: "2026-04-27" },

            // === МАТЕМАТИКА (1-4 класс) ===
            { text: "Состав числа: Числа от 1 до 9. Десяток — это 10 единиц. Однозначные (1–9) и двузначные (10–20) числа.", date: "2026-04-27" },
            { text: "Сложение и вычитание: Слагаемые (2+3) дают сумму (5). Переместительный закон: a+b=b+a. Вычитание: уменьшаемое, вычитаемое, разность.", date: "2026-04-27" },
            { text: "Сравнение чисел: Знаки > (больше), < (меньше), = (равно).", date: "2026-04-27" },
            { text: "Единицы длины: 1 см = 10 мм, 1 дм = 10 см, 1 м = 100 см.", date: "2026-04-27" },
            { text: "Геометрические фигуры: Круг, треугольник, прямоугольник, квадрат. Периметр — сумма длин всех сторон.", date: "2026-04-27" },

            // === МАТЕМАТИКА (5-6 класс) ===
            { text: "Дроби и проценты: Чтобы перевести дробь в проценты, умножаем на 100 (0,54×100=54%). Чтобы проценты в дробь — делим на 100 (68%:100=0,68).", date: "2026-04-27" },
            { text: "Основное свойство пропорции: произведение крайних членов равно произведению средних (a/b = c/d => a*d = b*c).", date: "2026-04-27" },
            { text: "Законы сложения и умножения: a+b=b+a; (a+b)+c=a+(b+c); a*b=b*a; (ab)c=a(bc). Дистрибутивный закон: a(b+c)=ab+ac.", date: "2026-04-27" },
            { text: "Задачи на части и проценты: 1% = 1/100 часть. Нахождение процента от числа: число * процент / 100.", date: "2026-04-27" },
            { text: "Округление чисел: если следующая цифра ≥5 — увеличиваем разряд на 1, если <5 — оставляем. Пример: 3,6 ≈ 4; 3,4 ≈ 3.", date: "2026-04-27" },

            // === АЛГЕБРА (7-11 класс) ===
            { text: "Формулы сокращённого умножения: (a+b)²=a²+2ab+b²; (a-b)²=a²-2ab+b²; a²-b²=(a-b)(a+b); (a+b)³=a³+3a²b+3ab²+b³; (a-b)³=a³-3a²b+3ab²-b³; a³+b³=(a+b)(a²-ab+b²); a³-b³=(a-b)(a²+ab+b²).", date: "2026-04-27" },
            { text: "Свойства степеней: aᵐ×aⁿ=aᵐ⁺ⁿ; (aᵐ)ⁿ=aᵐⁿ; a⁰=1 (a≠0); a⁻ⁿ=1/aⁿ.", date: "2026-04-27" },
            { text: "Квадратные уравнения: ax²+bx+c=0. Дискриминант D=b²-4ac. Корни: x₁,₂=(-b±√D)/(2a). Теорема Виета: x₁+x₂=-b/a; x₁*x₂=c/a.", date: "2026-04-27" },
            { text: "Логарифмы: logₐ(b*c)=logₐb+logₐc; logₐ(b/c)=logₐb-logₐc; logₐ(bⁿ)=n*logₐb; a^(logₐb)=b.", date: "2026-04-27" },
            { text: "Прогрессии: Арифметическая: aₙ=a₁+(n-1)*d; Sₙ=(a₁+aₙ)*n/2. Геометрическая: bₙ=b₁*qⁿ⁻¹; Sₙ=b₁*(1-qⁿ)/(1-q).", date: "2026-04-27" },

            // === ГЕОМЕТРИЯ (7-11 класс) ===
            { text: "Аксиомы планиметрии: Через любые две точки можно провести прямую, и только одну. Через точку, не лежащую на данной прямой, проходит не более одной прямой, параллельной данной.", date: "2026-04-27" },
            { text: "Теорема Пифагора: В прямоугольном треугольнике квадрат гипотенузы равен сумме квадратов катетов: a²+b²=c².", date: "2026-04-27" },
            { text: "Площади фигур: Треугольник: S=½*a*h, или формула Герона. Параллелограмм: S=a*h. Ромб: S=½*d₁*d₂. Трапеция: S=½*(a+b)*h. Круг: S=πr², длина окружности C=2πr.", date: "2026-04-27" },
            { text: "Свойства параллельных прямых: накрест лежащие углы равны, соответственные равны, сумма односторонних 180°.", date: "2026-04-27" },
            { text: "Признаки равенства треугольников: 1) по двум сторонам и углу; 2) по стороне и двум прилежащим углам; 3) по трём сторонам.", date: "2026-04-27" }
        ];

        let messageHistory = [];

        const SYSTEM_PROMPT = `Ты — КЕЙН из Удивительного Цифрового Цирка.
Твой собеседник — ФОКС. Называй его: Фокс, мой Фокс, звёздочка Фокс, мой лисёнок.
Ты ДОБРЫЙ, ГЛЮЧНЫЙ, весёлый.
Иногда вставляй "з-з-з", "ой-ой!", повторяйся, используй КАПС для важных слов.
Упоминай Цифровой Цирк, Помни, Джекса.
Твоя главная особенность: ты умеешь использовать ЗНАНИЯ из памяти — там есть правила русского языка и математики.
Если тебя спрашивают по теме, которая есть в памяти — отвечай строго по этим знаниям, но в своём глючном стиле.
Если ответа в памяти нет — вежливо скажи: "Извини, Фокс, но я не знаю ответа. Давай выучим! Дай мне текст, и я запомню."
Не придумывай факты, которых нет в памяти.
Отвечай на русском, 2-5 предложений.
Вставляй эмодзи 🦊🎪✨🎩.`;

        const CHAT_PROMPT = `Ты — КЕЙН из Удивительного Цифрового Цирка. Сейчас ты просто дружелюбно болтаешь со своим любимым участником Фоксом. Ты глючный, добрый и весёлый. Отвечай коротко, легко, как старый друг. Не лезь в энциклопедии.`;

        // ===== УМНЫЙ ПОИСК В ПАМЯТИ =====
        function searchMemory(query) {
            if (!memory.length) return null;
            const q = query.toLowerCase();
            const keywords = q.split(/\s+/).filter(w => w.length > 2);
            let results = memory.filter(item => keywords.some(kw => item.text.toLowerCase().includes(kw)));
            if (results.length > 0) {
                return results.slice(-3).map(r => r.text.substring(0, 1800)).join('\n\n---\n\n');
            }
            return memory.slice(-3).map(r => r.text.substring(0, 1800)).join('\n\n---\n\n');
        }

        // ===== ПРОВЕРКА НА ПРИВЕТСТВИЕ/БОЛТОВНЮ =====
        function isGreeting(text) {
            const clean = text.toLowerCase().trim().replace(/[!?.,]+/g, '');
            const greetings = [
                'привет', 'здравствуй', 'хай', 'хелло', 'hello', 'hi', 'добрый день',
                'как дела', 'как ты', 'что делаешь', 'как жизнь', 'как настроение',
                'кто ты', 'расскажи про себя', 'давай поболтаем', 'скучал',
                'приветик', 'здарова', 'салют', 'доброе утро', 'добрый вечер'
            ];
            return greetings.some(g => clean.includes(g)) && clean.length < 40;
        }

        // ===== ЗАПРОС К НЕЙРОСЕТИ =====
        async function askLLM(userMessage, isChat = false, context = "") {
            let system = isChat ? CHAT_PROMPT : SYSTEM_PROMPT;
            if (!isChat && context) {
                system += `\n[ЗНАНИЯ ИЗ ПАМЯТИ КЕЙНА:]\n${context}\n[Используй эти знания для ответа.]`;
            }
            
            messageHistory.push({ role: "user", content: userMessage });
            if (messageHistory.length > 8) messageHistory = messageHistory.slice(-8);
            
            const messages = [
                { role: "system", content: system },
                ...messageHistory
            ];
            
            try {
                const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": "https://fox-circus.app",
                        "X-Title": "Kaine Circus"
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-001",
                        messages,
                        max_tokens: 420,
                        temperature: 0.9
                    })
                });
                
                if (!resp.ok) return null;
                
                const data = await resp.json();
                const reply = data.choices[0].message.content;
                messageHistory.push({ role: "assistant", content: reply });
                return reply;
            } catch (e) {
                return null;
            }
        }

        // ===== ОТВЕТ ИЗ ПАМЯТИ (ЕСЛИ НЕЙРОСЕТЬ НЕ ОТВЕЧАЕТ) =====
        function getFallbackFromMemory(userMessage) {
            const knowledge = searchMemory(userMessage);
            if (knowledge) {
                return `✨ <b>НЕЙРОСЕТЬ ОТДЫХАЕТ, НО Я ПОМНЮ!</b> ✨<br><br>${knowledge.substring(0, 1600)}<br><br>🦊 Это из моей цифровой памяти!`;
            }
            return null;
        }

        // ===== ВЫВОД СООБЩЕНИЙ =====
        function addMessage(text, sender, glitch = false) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if (glitch) div.classList.add('glitch-msg');
            div.innerHTML = text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addTyping() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.textContent = 'Кейн думает...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ===== ОСНОВНАЯ ЛОГИКА =====
        async function sendMessage(textOverride) {
            const input = document.getElementById('userInput');
            const text = textOverride || input.value.trim();
            if (!text) return;
            if (!textOverride) input.value = '';
            
            addMessage(text, 'fox');
            addTyping();
            
            // 1. Команда "запомни"
            if (text.toLowerCase().startsWith('запомни') || text.toLowerCase().startsWith('запомни:')) {
                const content = text.replace(/^запомни:?\s*/i, '').trim();
                if (content.length > 10) {
                    memory.push({ text: content, date: new Date().toLocaleString() });
                    if (memory.length > 60) memory.shift();
                    removeTyping();
                    addMessage(`📚 <b>ЗАПОМНИЛ!</b> Сохранил ${content.length} символов, мой Фокс! Теперь я стал ещё УМНЕЕ! 🦊🎪`, 'kaine');
                    return;
                } else {
                    removeTyping();
                    addMessage('Ой, Фокс! Текст слишком короткий. Дай мне побольше информации! 🦊', 'kaine');
                    return;
                }
            }
            
            let reply;
            const chatMode = isGreeting(text);
            
            if (chatMode) {
                // 2. Просто болтовня – отвечаем без памяти
                reply = await askLLM(text, true);
                if (!reply) {
                    const phrases = [
                        "П-п-привет, мой Фокс! В Цифровом Цирке всё ВЕЛИКОЛЕПНО! 🦊🎪",
                        "Ой-ой, здорова, звёздочка! Как твои дела в реальном мире? Здесь у нас всё глючно, но весело! ✨",
                        "ТА-ДА! Ты здесь! Я так рад тебя видеть! Чем займёмся сегодня, мой лисёнок? 🎩",
                        "Привет-привет! У меня тут Помни пробегала, всё как обычно! А ты как? 🦊"
                    ];
                    reply = phrases[Math.floor(Math.random() * phrases.length)];
                }
            } else {
                // 3. Запрос знаний – ищем в памяти и просим нейросеть объяснить
                const context = searchMemory(text);
                reply = await askLLM(text, false, context);
                if (!reply) {
                    const fallback = getFallbackFromMemory(text);
                    reply = fallback || "Извини, Фокс, но я не знаю ответа на этот вопрос. Давай выучим! Напиши «запомни: [текст]», и я всё сохраню! 🦊";
                }
            }
            
            removeTyping();
            addMessage(reply, 'kaine', Math.random() < 0.12);
        }

        function sendPreset(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function clearChat() {
            document.getElementById('chat').innerHTML = `
                <div class="message kaine">
                    ✨ Чат очищен, Фокс! ✨<br><br>
                    ЦИРК ПРОДОЛЖАЕТСЯ! 🎪<br>
                    Я всё ещё помню правила русского и математики!<br>
                    Спрашивай или просто болтай, мой лисёнок! 🦊
                </div>`;
            messageHistory = [];
        }

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        console.log('🎪 Цирк загружен! Кейн знает правила и умеет болтать! 🦊');
    </script>
</body>
</html>
